<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Center</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        .center-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 2px solid black;
        }

        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: purple;
            margin: 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    
    <div class="center-box">
        <p class="center-text">This is center</p>
    </div>

</body>
</html>
